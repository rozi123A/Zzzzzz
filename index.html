<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rain Star ✨</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--text:#f8fafc;--muted:#94a3b8;--gold:#fbbf24;--gold-dark:#d97706;--green:#10b981;--blue:#3b82f6;--purple:#8b5cf6;--red:#ef4444;--border:#334155;--shadow:0 10px 25px -5px rgba(0,0,0,0.3);--radius:20px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:16px;display:flex;align-items:center;justify-content:space-between;color:white;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(to right, #fbbf24, #f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.container{max-width:480px;margin:0 auto;padding:12px 16px 100px}
.balance-card{background:linear-gradient(135deg,#334155,#1e293b);border-radius:var(--radius);padding:24px;color:white;text-align:center;margin-bottom:16px;border:1px solid var(--border);box-shadow:var(--shadow)}
.balance-label{font-size:14px;opacity:.8;margin-bottom:8px;letter-spacing:1px}
.balance-amount{font-size:42px;font-weight:800;text-shadow:0 0 20px rgba(251,191,36,0.3)}
.balance-stars{font-size:16px;opacity:.9;margin-top:4px;color:var(--gold)}

/* === 3D Daily Gift Section === */
.gift3d-container {
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    border-radius: 24px;
    padding: 30px 20px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(251, 191, 36, 0.2);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.gift3d-container::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(from 0deg, transparent, rgba(251, 191, 36, 0.1), transparent 30%);
    animation: rotateBg 10s linear infinite;
    z-index: 0;
}
@keyframes rotateBg {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
.gift3d-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--gold);
    margin-bottom: 5px;
    position: relative;
    z-index: 1;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
.gift3d-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 30px;
    position: relative;
    z-index: 1;
}
.gift3d-scene {
    width: 150px;
    height: 150px;
    perspective: 1000px;
    margin: 0 auto 30px;
    position: relative;
    z-index: 1;
    cursor: pointer;
}
.gift3d-box {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-20deg) rotateY(45deg);
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: floatBox 3s ease-in-out infinite;
}
@keyframes floatBox {
    0%, 100% { transform: rotateX(-20deg) rotateY(45deg) translateY(0); }
    50% { transform: rotateX(-20deg) rotateY(45deg) translateY(-15px); }
}
.gift3d-box.opening {
    animation: openBox 1.5s forwards;
}
@keyframes openBox {
    0% { transform: rotateX(-20deg) rotateY(45deg) scale(1); }
    20% { transform: rotateX(-20deg) rotateY(45deg) scale(1.1) rotateZ(5deg); }
    40% { transform: rotateX(-20deg) rotateY(45deg) scale(1.1) rotateZ(-5deg); }
    60% { transform: rotateX(-20deg) rotateY(45deg) scale(1.2); }
    100% { transform: rotateX(-20deg) rotateY(45deg) scale(0) opacity: 0; }
}
.gift-face {
    position: absolute;
    width: 150px;
    height: 150px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border: 2px solid #b45309;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
}
/* Ribbon Design */
.gift-face::before {
    content: '';
    position: absolute;
    background: #fef3c7;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
.face-front  { transform: translateZ(75px); }
.face-back   { transform: rotateY(180deg) translateZ(75px); }
.face-right  { transform: rotateY(90deg) translateZ(75px); }
.face-left   { transform: rotateY(-90deg) translateZ(75px); }
.face-top    { transform: rotateX(90deg) translateZ(75px); background: #fbbf24; }
.face-bottom { transform: rotateX(-90deg) translateZ(75px); background: #92400e; }

/* Vertical Ribbon */
.face-front::before, .face-back::before, .face-top::before, .face-bottom::before {
    width: 30px; height: 100%; left: 60px; top: 0;
}
/* Horizontal Ribbon */
.face-left::before, .face-right::before, .face-top::after, .face-bottom::after {
    content: ''; position: absolute; background: #fef3c7;
    width: 100%; height: 30px; top: 60px; left: 0;
}

.gift-lid {
    position: absolute;
    width: 160px;
    height: 40px;
    top: -20px;
    left: -5px;
    transform-style: preserve-3d;
    transform: translateZ(0);
}

.claim-btn {
    background: linear-gradient(135deg, #fbbf24, #d97706);
    color: #000;
    border: none;
    padding: 15px 40px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(217, 119, 6, 0.4);
    transition: all 0.3s;
    position: relative;
    z-index: 1;
}
.claim-btn:active { transform: scale(0.95); }
.claim-btn:disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; }

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;color:var(--muted);text-decoration:none;font-size:11px;font-weight:500;transition:.2s}
.nav-item.active{color:var(--gold)}
.nav-icon{font-size:20px}

/* Toast & Modal */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-120px);background:#1e293b;color:white;padding:14px 24px;border-radius:12px;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .35s cubic-bezier(.34,1.56,.64,1);max-width:90%;border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:24px;padding:30px;max-width:340px;width:100%;text-align:center;border:1px solid var(--border);animation:modalIn .4s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
@keyframes modalIn{from{transform:scale(0.8) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.reward-glow {
    width: 80px; height: 80px; background: var(--gold); border-radius: 50%; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center; font-size: 40px;
    box-shadow: 0 0 30px var(--gold); animation: pulse 2s infinite;
}
@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px var(--gold); } 50% { transform: scale(1.1); box-shadow: 0 0 40px var(--gold); } 100% { transform: scale(1); box-shadow: 0 0 20px var(--gold); } }

</style>
</head>
<body>

<div class="header">
    <h1>Rain Star ✨</h1>
    <div class="header-icon" onclick="showPage('settings')">⚙️</div>
</div>

<div class="container">
    <!-- Balance Card -->
    <div class="balance-card">
        <div class="balance-label">رصيدك الحالي</div>
        <div class="balance-amount" id="user-pts">0</div>
        <div class="balance-stars" id="user-stars">0.00 نجمة</div>
    </div>

    <!-- 3D Daily Gift -->
    <div class="gift3d-container">
        <h2 class="gift3d-title">الهدية اليومية</h2>
        <p class="gift3d-subtitle">افتح الصندوق واحصل على مكافأتك العشوائية!</p>
        
        <div class="gift3d-scene" onclick="claimDailyGift()">
            <div class="gift3d-box" id="gift-box">
                <div class="gift-face face-front"></div>
                <div class="gift-face face-back"></div>
                <div class="gift-face face-right"></div>
                <div class="gift-face face-left"></div>
                <div class="gift-face face-top"></div>
                <div class="gift-face face-bottom"></div>
            </div>
        </div>

        <button class="claim-btn" id="claim-btn" onclick="claimDailyGift()">افتح الهدية الآن</button>
        <p id="gift-timer" style="margin-top:15px; font-size:14px; color:var(--gold); display:none;"></p>
    </div>

    <!-- Additional Content Placeholder -->
    <div id="home-content">
        <!-- Add more cards here -->
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item active" onclick="showPage('home')">
        <span class="nav-icon">🏠</span>
        <span>الرئيسية</span>
    </a>
    <a href="#" class="nav-item" onclick="showPage('tasks')">
        <span class="nav-icon">📋</span>
        <span>المهام</span>
    </a>
    <a href="#" class="nav-item" onclick="showPage('ads')">
        <span class="nav-icon">📺</span>
        <span>إعلانات</span>
    </a>
    <a href="#" class="nav-item" onclick="showPage('invite')">
        <span class="nav-icon">👥</span>
        <span>الأصدقاء</span>
    </a>
    <a href="#" class="nav-item" onclick="showPage('withdraw')">
        <span class="nav-icon">💰</span>
        <span>سحب</span>
    </a>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Reward Modal -->
<div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
        <div class="reward-glow">🎁</div>
        <h2 id="modal-title">مبروك!</h2>
        <p id="modal-text" style="margin: 15px 0; color: var(--muted); line-height: 1.6;"></p>
        <button class="claim-btn" onclick="closeModal()">رائع!</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
const userId = tg.initDataUnsafe?.user?.id || '123456';
const userName = tg.initDataUnsafe?.user?.first_name || 'User';

async function initApp() {
    try {
        const res = await fetch(`/api/user/${userId}`);
        const data = await res.json();
        if(data.success) {
            updateUI(data.user);
            checkGiftStatus(data.user.lastDailyGift);
        }
    } catch(e) {
        showToast('فشل الاتصال بالسيرفر', true);
    }
}

function updateUI(user) {
    document.getElementById('user-pts').innerText = user.pts.toLocaleString();
    document.getElementById('user-stars').innerText = `${user.stars.toLocaleString()} نجمة`;
}

function checkGiftStatus(lastGiftTime) {
    if (!lastGiftTime) return;
    const now = Date.now();
    const last = new Date(lastGiftTime).getTime();
    const ONE_DAY = 24 * 60 * 60 * 1000;
    
    if (now - last < ONE_DAY) {
        const remaining = ONE_DAY - (now - last);
        startTimer(remaining);
        disableGift();
    }
}

function disableGift() {
    const btn = document.getElementById('claim-btn');
    btn.disabled = true;
    btn.innerText = 'تم الاستلام';
    document.getElementById('gift-box').style.animation = 'none';
    document.getElementById('gift-box').style.opacity = '0.5';
}

function startTimer(ms) {
    const timerEl = document.getElementById('gift-timer');
    timerEl.style.display = 'block';
    
    const update = () => {
        if (ms <= 0) {
            location.reload();
            return;
        }
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        timerEl.innerText = `الهدية القادمة خلال: ${h}س ${m}د ${s}ث`;
        ms -= 1000;
        setTimeout(update, 1000);
    };
    update();
}

async function claimDailyGift() {
    const btn = document.getElementById('claim-btn');
    if(btn.disabled) return;
    
    btn.disabled = true;
    const box = document.getElementById('gift-box');
    box.classList.add('opening');
    
    try {
        const res = await fetch(`/api/daily-gift/${userId}`, { method: 'POST' });
        const data = await res.json();
        
        if(data.success) {
            setTimeout(() => {
                showModal('هدية يومية!', `لقد حصلت على ${data.reward} نقطة! 🎉\nفئة الهدية: ${data.tier}\nمتتالية الأيام: ${data.streak}`);
                initApp();
            }, 1000);
        } else {
            box.classList.remove('opening');
            showToast(data.error, true);
            btn.disabled = false;
        }
    } catch(e) {
        box.classList.remove('opening');
        showToast('حدث خطأ ما', true);
        btn.disabled = false;
    }
}

function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.className = `toast show ${isError ? 'error' : ''}`;
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function showModal(title, text) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-text').innerText = text;
    document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
}

initApp();
</script>
</body>
</html>
